<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sistem Notifikasi Jadwal Kuliah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f8f9fa;
      }
      .sidebar {
        height: 100vh;
        background: #212529;
      }
      .sidebar a {
        color: #adb5bd;
        text-decoration: none;
        display: block;
        padding: 12px 20px;
        border-radius: 8px;
      }
      .sidebar a.active,
      .sidebar a:hover {
        background: #0d6efd;
        color: #fff;
      }
      .content {
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <!-- Sidebar -->
      <div class="sidebar p-3">
        <h5 class="text-white mb-4">Menu</h5>
        <a href="#" class="active">Tahun Akademik</a>
        <a href="#">Dosen</a>
        <a href="#">Matakuliah</a>
        <a href="#">Fakultas</a>
        <a href="#">Prodi</a>
        <a href="#">Jadwal</a>
        <a href="#">Log Notif</a>
        <a href="#">Pengaturan Parameter</a>
      </div>

      <!-- Content -->
      <div class="flex-grow-1">
        <!-- Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm px-4">
          <span class="navbar-brand mb-0 h5"
            >Sistem Notifikasi Jadwal Kuliah</span
          >
        </nav>

        <!-- Main Content -->
        <div class="content">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Data Tahun Akademik</h5>
              <table class="table table-striped table-bordered mt-3">
                <thead class="table-dark">
                  <tr>
                    <th>#</th>
                    <th>Nama Tahun</th>
                    <th>Status</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>1</td>
                    <td>2025/2026</td>
                    <td><span class="badge bg-success">Aktif</span></td>
                    <td>
                      <button class="btn btn-sm btn-warning">Edit</button>
                      <button class="btn btn-sm btn-danger">Hapus</button>
                    </td>
                  </tr>
                </tbody>
              </table>
              <button class="btn btn-primary btn-sm">
                + Tambah Tahun Akademik
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
